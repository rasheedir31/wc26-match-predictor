name: Pipeline (scheduled refresh)

# The "production" automation: on a schedule (and on demand), run the same pipeline
# task functions that `make pipeline` and the Airflow DAG call - re-ingest results,
# retrain, re-simulate, regenerate the snapshot, refresh the live loop, and commit
# the updated snapshot so the next deploy serves fresh predictions.

on:
  schedule:
    - cron: "17 6 * * *"  # daily 06:17 UTC (bump frequency during the tournament)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run full pipeline (ETL + train + simulate + snapshot + monitor)
        run: uv run python -m wc26.pipeline all

      - name: Commit refreshed snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/snapshot
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore: refresh snapshot [skip ci]"
            git push
          fi
